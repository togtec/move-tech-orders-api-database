apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-application
  labels:
    app: cloud-application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-application
  template:
    metadata:
      labels:
        app: cloud-application
    spec:
      containers:
      - name: cloud-application
        image: container-registry.br-se1.magalu.cloud/${MGC_REGISTRY_NAME}/cloud-application:latest
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-application
spec:
  selector:
    app: cloud-application
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
